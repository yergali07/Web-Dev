<article class="card">
  <div class="gallery" *ngIf="galleryImages.length; else noImageTemplate">
    <div class="main-image-wrap">
      <img class="main-image" [src]="selectedImage" [alt]="product.name" loading="lazy" />

      <button
        type="button"
        class="nav-button left"
        *ngIf="galleryImages.length > 1"
        (click)="previousImage()"
        aria-label="Previous image"
      >
        &lt;
      </button>

      <button
        type="button"
        class="nav-button right"
        *ngIf="galleryImages.length > 1"
        (click)="nextImage()"
        aria-label="Next image"
      >
        &gt;
      </button>
    </div>

    <div class="thumb-list" [class.is-placeholder]="galleryImages.length <= 1">
      <button
        type="button"
        class="thumb-button"
        *ngFor="let image of galleryImages; let i = index"
        [class.active]="i === selectedImageIndex"
        (click)="selectImage(i)"
        [attr.aria-label]="'Show image ' + (i + 1)"
      >
        <img [src]="image" [alt]="product.name + ' thumbnail ' + (i + 1)" loading="lazy" />
      </button>
    </div>
  </div>

  <div class="content">
    <h3 class="name">{{ product.name }}</h3>
    <p class="description">{{ product.description }}</p>

    <div class="meta-row">
      <p class="price">{{ formatPrice(product.price) }} KZT</p>
      <div class="rating" [attr.aria-label]="'Rating ' + product.rating + ' out of 5'">
        <span class="star" *ngFor="let star of starSlots" [class.filled]="star <= roundedRating">★</span>
        <span class="rating-number">{{ product.rating }}</span>
      </div>
    </div>

    <div class="likes-row">❤ {{ product.likes }}</div>

    <div class="action-grid">
      <div class="action-row">
        <button type="button" class="action-btn like-btn" (click)="likeProduct()">
          <svg
            *ngIf="product.likes === 0"
            class="btn-icon like-icon"
            viewBox="0 0 122.88 109.57"
            aria-hidden="true"
          >
            <path
              d="M65.46,19.57c-0.68,0.72-1.36,1.45-2.2,2.32l-2.31,2.41l-2.4-2.33c-0.71-0.69-1.43-1.4-2.13-2.09 c-7.42-7.3-13.01-12.8-24.52-12.95c-0.45-0.01-0.93,0-1.43,0.02c-6.44,0.23-12.38,2.6-16.72,6.65c-4.28,4-7.01,9.67-7.1,16.57 c-0.01,0.43,0,0.88,0.02,1.37c0.69,19.27,19.13,36.08,34.42,50.01c2.95,2.69,5.78,5.27,8.49,7.88l11.26,10.85l14.15-14.04 c2.28-2.26,4.86-4.73,7.62-7.37c4.69-4.5,9.91-9.49,14.77-14.52c3.49-3.61,6.8-7.24,9.61-10.73c2.76-3.42,5.02-6.67,6.47-9.57 c2.38-4.76,3.13-9.52,2.62-13.97c-0.5-4.39-2.23-8.49-4.82-11.99c-2.63-3.55-6.13-6.49-10.14-8.5C96.5,7.29,91.21,6.2,85.8,6.82 C76.47,7.9,71.5,13.17,65.46,19.57L65.46,19.57z M60.77,14.85C67.67,7.54,73.4,1.55,85.04,0.22c6.72-0.77,13.3,0.57,19.03,3.45 c4.95,2.48,9.27,6.1,12.51,10.47c3.27,4.42,5.46,9.61,6.1,15.19c0.65,5.66-0.29,11.69-3.3,17.69c-1.7,3.39-4.22,7.03-7.23,10.76 c-2.95,3.66-6.39,7.44-10,11.17C97.2,74.08,91.94,79.12,87.2,83.66c-2.77,2.65-5.36,5.13-7.54,7.29L63.2,107.28l-2.31,2.29 l-2.34-2.25l-13.6-13.1c-2.49-2.39-5.37-5.02-8.36-7.75C20.38,71.68,0.81,53.85,0.02,31.77C0,31.23,0,30.67,0,30.09 c0.12-8.86,3.66-16.18,9.21-21.36c5.5-5.13,12.97-8.13,21.01-8.42c0.55-0.02,1.13-0.03,1.74-0.02C46,0.48,52.42,6.63,60.77,14.85 L60.77,14.85z"
            />
          </svg>
          <svg
            *ngIf="product.likes > 0"
            class="btn-icon like-icon like-icon-filled"
            viewBox="0 0 122.88 107.41"
            aria-hidden="true"
          >
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M60.83,17.19C68.84,8.84,74.45,1.62,86.79,0.21c23.17-2.66,44.48,21.06,32.78,44.41 c-3.33,6.65-10.11,14.56-17.61,22.32c-8.23,8.52-17.34,16.87-23.72,23.2l-17.4,17.26L46.46,93.56C29.16,76.9,0.95,55.93,0.02,29.95 C-0.63,11.75,13.73,0.09,30.25,0.3C45.01,0.5,51.22,7.84,60.83,17.19L60.83,17.19L60.83,17.19z"
            />
          </svg>
          <span>Like</span>
        </button>

        <button type="button" class="action-btn delete-btn" (click)="deleteProduct()">
          <svg class="btn-icon delete-icon" viewBox="0 0 105.16 122.88" aria-hidden="true">
            <path
              fill-rule="evenodd"
              d="M11.17,37.16H94.65a8.4,8.4,0,0,1,2,.16,5.93,5.93,0,0,1,2.88,1.56,5.43,5.43,0,0,1,1.64,3.34,7.65,7.65,0,0,1-.06,1.44L94,117.31v0l0,.13,0,.28v0a7.06,7.06,0,0,1-.2.9v0l0,.06v0a5.89,5.89,0,0,1-5.47,4.07H17.32a6.17,6.17,0,0,1-1.25-.19,6.17,6.17,0,0,1-1.16-.48h0a6.18,6.18,0,0,1-3.08-4.88l-7-73.49a7.69,7.69,0,0,1-.06-1.66,5.37,5.37,0,0,1,1.63-3.29,6,6,0,0,1,3-1.58,8.94,8.94,0,0,1,1.79-.13ZM5.65,8.8H37.12V6h0a2.44,2.44,0,0,1,0-.27,6,6,0,0,1,1.76-4h0A6,6,0,0,1,43.09,0H62.46l.3,0a6,6,0,0,1,5.7,6V6h0V8.8h32l.39,0a4.7,4.7,0,0,1,4.31,4.43c0,.18,0,.32,0,.5v9.86a2.59,2.59,0,0,1-2.59,2.59H2.59A2.59,2.59,0,0,1,0,23.62V13.53H0a1.56,1.56,0,0,1,0-.31v0A4.72,4.72,0,0,1,3.88,8.88,10.4,10.4,0,0,1,5.65,8.8Zm42.1,52.7a4.77,4.77,0,0,1,9.49,0v37a4.77,4.77,0,0,1-9.49,0v-37Zm23.73-.2a4.58,4.58,0,0,1,5-4.06,4.47,4.47,0,0,1,4.51,4.46l-2,37a4.57,4.57,0,0,1-5,4.06,4.47,4.47,0,0,1-4.51-4.46l2-37ZM25,61.7a4.46,4.46,0,0,1,4.5-4.46,4.58,4.58,0,0,1,5,4.06l2,37a4.47,4.47,0,0,1-4.51,4.46,4.57,4.57,0,0,1-5-4.06l-2-37Z"
            />
          </svg>
          <span>Delete</span>
        </button>
      </div>

      <div class="action-row action-row-secondary">
        <a class="kaspi-link" [href]="product.link" target="_blank" rel="noopener noreferrer">
          <img
            class="kaspi-logo"
            src="https://companieslogo.com/img/orig/KKS.F-9d710a31.png"
            alt="Kaspi logo"
            loading="lazy"
          />
          <span>Open on Kaspi.kz</span>
        </a>

        <div class="share-group">
          <button type="button" class="action-btn share-btn share-button" (click)="toggleShareOptions()">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M15 8a3 3 0 1 0-2.83-4H12a3 3 0 0 0 .17 1l-4.83 2.9a3 3 0 1 0 0 8.2l4.83 2.9A3 3 0 1 0 13 17a2.98 2.98 0 0 0-.83.12l-4.83-2.9a3.04 3.04 0 0 0 0-4.44l4.83-2.9c.27.08.55.12.83.12a3 3 0 0 0 3-3Z"
              />
            </svg>
            <span>Share</span>
          </button>
          <div class="share-options" *ngIf="showShareOptions">
            <button type="button" (click)="shareToWhatsApp()">WhatsApp</button>
            <button type="button" (click)="shareToTelegram()">Telegram</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</article>

<ng-template #noImageTemplate>
  <div class="no-image">No image available</div>
</ng-template>
