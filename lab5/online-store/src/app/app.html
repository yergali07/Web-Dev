<div class="app-shell">
  <header class="topbar">
    <p class="brand">Online Store :)</p>

    <nav class="top-categories" aria-label="Product categories">
      <button
        type="button"
        class="category-button"
        *ngFor="let category of categories"
        [class.active]="category.id === selectedCategoryId"
        (click)="selectCategory(category)"
      >
        {{ category.name }}
      </button>
    </nav>
  </header>

  <main class="content-area">
    <section class="products-panel" *ngIf="selectedCategoryId !== null; else welcomeTemplate">
      <app-product-list
        [products]="selectedProducts"
        [categoryName]="selectedCategoryName"
        (productDeleted)="onProductDeleted($event)"
      />
    </section>
  </main>
</div>

<ng-template #welcomeTemplate>
  <section class="welcome-card">
    <h2>Welcome</h2>
    <p>Please select a category to view products.</p>
  </section>
</ng-template>
