<!DOCTYPE HTML>
<html>

    <head>
    
        <title>Challenge: Write a Poem</title>
        
        <meta charset="utf-8">
        
    </head>
    
    <body>
    
        <h1>My poem</h1>
        
        <p>
            Do you want to be always happy? <br>
            Then give up fighting <br>
            For negativity <br>
            And learn the beautiful art <br>
            Of self-encouragement. <br>
            <br>
            Sri Chinmoy
        </p>
        
    </body>
    
</html>
