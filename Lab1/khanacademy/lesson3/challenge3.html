<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Challenge: The dinner table</title>
    </head>
    <body>
    
        <h1>Our dinner menu</h1>

        <table>
            <thead>
                <tr>
                    <th>Meal</th>
                    <th>Ingredients</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Cheeseburger</td>
                    <td>Meat, buns, cheese, tomatos, sauce</td>
                    <td>3.99$</td>
                </tr>
                <tr>
                    <td>Chicken doner</td>
                    <td>Chicken, wrap, cheese, vegetables, sauce</td>
                    <td>2.99$</td>
                </tr>
                <tr>
                    <td>Ramen</td>
                    <td>Noodles, meat, soup, spice, chicken egg</td>
                    <td>4.99$</td>
                </tr>
            </tbody>
        </table>

    </body>
</html>
