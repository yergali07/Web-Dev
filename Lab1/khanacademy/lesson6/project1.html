<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Project: Event invite</title>
        <style>
            
            body {
                background-color: rgb(48, 48, 48);
                color: white;
            }
            
            #header {
                position: relative;
                left: 50%;
                font-family: cursive;
                font-style: italic;
                background: rgb(82, 82, 82);
                border: 1px dotted;
            }
            
            #invited {
                color: lime;
            }
            
            #details {
                border: 1px dashed;
                font-family: sans-serif;
                margin: 5px;
                padding: 5px;
            }
            
            thead, tbody, th, tr, td {
                border: 1px solid;
                padding: 5px;
            }
            
        </style>
    </head>
    <body>
        
        <div id="header">
        <h1>You're <span id="invited">invited</span>!</h1>
        <h2>To graduation party!</h2>
        </div>
        
        <div id="details">
        <p id="details">The details:</p>
            <table id="table">
                <thead>
                    <tr>
                        <th>Place</th>
                        <th>Date</th>
                        <th>Number of people</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>KBTU</td>
                        <td>28 Jan 2026 18:00</td>
                        <td>Up to 300</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
    </body>
</html>
